services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test:
        - CMD
        - bash
        - -lc
        - |
          exec 3<>/dev/tcp/127.0.0.1/6333
          printf 'GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
          grep -q '200 OK' <&3
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 2s

volumes:
  qdrant_storage:
    name: gocodemunch_qdrant_storage
